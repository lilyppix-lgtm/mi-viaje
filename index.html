<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mi Viaje">
<meta name="theme-color" content="#ffffff">
<title>Mi Viaje ✈️</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<!-- Icono SVG inline como data URI para apple-touch-icon sin archivo externo -->
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23378ADD'/%3E%3Ctext x='90' y='115' font-size='90' text-anchor='middle'%3E✈️%3C/text%3E%3C/svg%3E">

<style>
:root {
  --bg:#fff;--bg2:#f5f5f5;--bg3:#ebebeb;
  --txt:#1a1a1a;--txt2:#666;--txt3:#999;
  --border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.2);
  --radius:10px;--radius-lg:14px;
  --safe-top:env(safe-area-inset-top);--safe-bot:env(safe-area-inset-bottom);
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--txt:#f2f2f7;--txt2:#aeaeb2;--txt3:#636366;--border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.2);}
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg2);color:var(--txt)}
.app{max-width:430px;margin:0 auto;min-height:100dvh;background:var(--bg);display:flex;flex-direction:column}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:calc(var(--safe-top) + 14px) 16px 10px;background:var(--bg);border-bottom:.5px solid var(--border);position:sticky;top:0;z-index:10}
.hdr h1{font-size:20px;font-weight:600}
.fab{width:34px;height:34px;border-radius:50%;background:var(--txt);color:var(--bg);border:none;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* TABS DÍAS */
.day-tabs-wrap{border-bottom:.5px solid var(--border);background:var(--bg);position:sticky;top:calc(var(--safe-top) + 53px);z-index:9}
.day-tabs{display:flex;overflow-x:auto;scrollbar-width:none;padding:0 12px}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{flex-shrink:0;padding:10px 14px;font-size:13px;font-weight:500;color:var(--txt2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.day-tab.active{color:var(--txt);border-bottom-color:var(--txt)}
.add-day-tab{flex-shrink:0;padding:10px 12px;color:var(--txt3);cursor:pointer;display:flex;align-items:center;font-size:18px}

/* RESUMEN DÍA */
.day-summary{margin:12px 16px 0;background:var(--bg2);border-radius:var(--radius-lg);padding:12px 14px;display:flex;flex-direction:column;gap:6px}
.summary-row{display:flex;justify-content:space-between;align-items:center}
.summary-row span{font-size:13px;color:var(--txt2)}
.summary-row strong{font-size:13px;font-weight:600}
.summary-total{display:flex;justify-content:space-between;align-items:center;padding-top:6px;border-top:.5px solid var(--border)}
.summary-total span{font-size:14px;font-weight:600}
.summary-total strong{font-size:16px;font-weight:700}

.scroll{flex:1;overflow-y:auto;padding-bottom:calc(var(--safe-bot) + 2rem)}
.items{display:flex;flex-direction:column;gap:8px;padding:12px 16px}

/* EVENTOS — colores sólidos */
.ev{border-radius:var(--radius-lg);padding:11px 13px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;border:.5px solid transparent;position:relative}
.ev-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;margin-top:1px}
.ev-body{flex:1;min-width:0}
.ev-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-meta{font-size:11px;margin-top:3px;display:flex;gap:8px;flex-wrap:wrap;opacity:.75}
.ev-right{position:absolute;top:11px;right:13px;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.ev-price{font-size:12px;font-weight:600}
.ev-pay{font-size:10px;opacity:.7}
.ev-top{display:flex;align-items:flex-start;gap:10px}
.ev-meta2{font-size:11px;margin-top:2px;opacity:.75;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-notes-inline{font-size:12.5px;line-height:1.5;opacity:.9;white-space:pre-wrap;word-break:break-word;margin-top:6px}
.ev-notes-inline ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:4px}
.ev-notes-inline ul li{display:flex;align-items:flex-start;gap:6px}
.ev-notes-inline ul li input[type=checkbox]{margin-top:2px;flex-shrink:0;accent-color:currentColor}
.day-footer{padding:4px 16px 12px}
.add-btn{width:100%;padding:9px;border-radius:var(--radius);border:.5px dashed var(--border2);background:none;font-size:13px;cursor:pointer;color:var(--txt2);display:flex;align-items:center;justify-content:center;gap:5px}
.add-btn:active{background:var(--bg2)}

/* SHEET */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:430px;padding-bottom:calc(var(--safe-bot) + 1rem);max-height:92dvh;overflow-y:auto}
.sheet-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 0}
.sheet-hdr h2{font-size:17px;font-weight:600}
.sheet-close{background:var(--bg2);border:none;border-radius:50%;width:28px;height:28px;font-size:16px;cursor:pointer;color:var(--txt2);display:flex;align-items:center;justify-content:center}
.sheet-body{padding:12px 16px;display:flex;flex-direction:column;gap:11px}
.field label{display:block;font-size:12px;color:var(--txt2);margin-bottom:4px;font-weight:500}
.field input,.field textarea,.field select{width:100%;padding:10px 12px;border:.5px solid var(--border2);border-radius:var(--radius);font-size:15px;background:var(--bg2);color:var(--txt);font-family:inherit;-webkit-appearance:none}
.field textarea{resize:none;min-height:70px;line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.color-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.cswatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;flex-shrink:0}
.cswatch.sel{border-color:var(--txt)}
input[type=color]{width:28px;height:28px;border-radius:50%;border:.5px solid var(--border2);cursor:pointer;padding:0;background:none}
.icon-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
.icon-opt{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;font-size:18px;border:.5px solid transparent;color:var(--txt2)}
.icon-opt.sel{border-color:var(--border2);background:var(--bg2);color:var(--txt)}
.sheet-actions{display:flex;gap:8px;padding:4px 16px}
.btn-del{padding:12px 16px;border-radius:var(--radius);border:.5px solid #E24B4A44;background:none;color:#E24B4A;cursor:pointer;font-size:14px}
.btn-cancel{flex:1;padding:12px;border-radius:var(--radius);border:.5px solid var(--border2);background:none;cursor:pointer;font-size:15px;color:var(--txt2)}
.btn-save{flex:2;padding:12px;border-radius:var(--radius);border:none;background:var(--txt);color:var(--bg);cursor:pointer;font-size:15px;font-weight:600}

/* DETALLE */
.detail{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;overflow-y:auto}
.detail.open{display:block}
.detail-hdr{display:flex;align-items:center;gap:12px;padding:calc(var(--safe-top) + 14px) 16px 12px;border-bottom:.5px solid var(--border)}
.back-btn{background:var(--bg2);border:none;border-radius:50%;width:32px;height:32px;font-size:18px;cursor:pointer;color:var(--txt);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dv-icon{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.dv-hdr-info h2{font-size:17px;font-weight:600}
.dv-hdr-info p{font-size:13px;color:var(--txt2);margin-top:2px}
.detail-body{padding:16px;display:flex;flex-direction:column;gap:10px}
.dv-row{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:var(--bg2);border-radius:var(--radius)}
.dv-row i{font-size:18px;color:var(--txt2);flex-shrink:0;margin-top:1px}
.dv-row-info label{font-size:11px;color:var(--txt2);font-weight:500}
.dv-row-info p{font-size:14px;margin-top:2px}
.notes-wrap{background:var(--bg2);border-radius:var(--radius);padding:12px 14px}
.notes-wrap label{font-size:12px;color:var(--txt2);font-weight:500;display:block;margin-bottom:6px}
.notes-wrap textarea{width:100%;background:none;border:none;font-size:14px;color:var(--txt);resize:none;outline:none;font-family:inherit;min-height:110px;line-height:1.6}
.edit-btn{margin:4px 16px 0;width:calc(100% - 32px);padding:13px;border-radius:var(--radius);border:.5px solid var(--border2);background:none;cursor:pointer;font-size:15px;color:var(--txt);display:flex;align-items:center;justify-content:center;gap:6px}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <h1>✈️ Mi viaje</h1>
    <div style="display:flex;align-items:center;gap:10px">
      <span id="sync-indicator" style="font-size:11px;font-weight:500"></span>
      <button class="fab" onclick="openNew()" aria-label="Añadir evento">+</button>
    </div>
  </div>
  <div class="day-tabs-wrap">
    <div class="day-tabs" id="day-tabs"></div>
  </div>
  <div class="scroll" id="main-scroll">
    <div id="day-summary-wrap"></div>
    <div class="items" id="items-container"></div>
    <div style="padding:0 16px 12px"><button class="add-btn" onclick="openNew()"><i class="ti ti-plus"></i> Añadir evento</button></div>
  </div>
</div>

<!-- MODAL EVENTO -->
<div class="overlay" id="modal-overlay">
  <div class="sheet">
    <div class="sheet-hdr">
      <h2 id="modal-title">Nuevo evento</h2>
      <button class="sheet-close" onclick="closeModal()">✕</button>
    </div>
    <div class="sheet-body">
      <div class="field"><label>Nombre</label><input id="f-name" type="text" placeholder="Ej: Vuelo a Roma"></div>
      <div class="field"><label>Detalle 1</label><input id="f-detail" type="text" placeholder="Ej: Terminal 2, puerta B7"></div>
      <div class="field"><label>Detalle 2</label><input id="f-detail2" type="text" placeholder="Ej: Recoger equipaje en cinta 4"></div>
      <div class="row2">
        <div class="field"><label>Hora inicio</label><input id="f-start" type="time" value="09:00"></div>
        <div class="field"><label>Hora fin</label><input id="f-end" type="time" value="10:00"></div>
      </div>
      <div class="row3">
        <div class="field"><label>Precio</label><input id="f-price" type="number" min="0" step="0.01" placeholder="0"></div>
        <div class="field"><label>Moneda</label>
          <select id="f-currency">
            <option value="EUR">€ Euro</option>
            <option value="JPY">¥ Yen</option>
          </select>
        </div>
        <div class="field"><label>Día</label><select id="f-day"></select></div>
      </div>
      <div class="field"><label>Forma de pago</label>
        <select id="f-pay">
          <option value="">— Sin especificar</option>
          <option value="Suica">🚇 Suica</option>
          <option value="Efectivo">💴 Efectivo</option>
          <option value="Tarjeta">💳 Tarjeta</option>
        </select>
      </div>
      <div class="field">
        <label>Color</label>
        <div class="color-row" id="color-row"></div>
      </div>
      <div class="field">
        <label>Icono</label>
        <div class="icon-grid" id="icon-grid"></div>
      </div>
    </div>
    <div class="sheet-actions">
      <button class="btn-del" id="btn-del" onclick="deleteEvent()" style="display:none"><i class="ti ti-trash"></i></button>
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveEvent()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL NUEVO DÍA -->
<div class="overlay" id="day-overlay">
  <div class="sheet">
    <div class="sheet-hdr">
      <h2>Nuevo día</h2>
      <button class="sheet-close" onclick="document.getElementById('day-overlay').classList.remove('open')">✕</button>
    </div>
    <div class="sheet-body">
      <div class="field"><label>Fecha</label><input id="nd-date" type="date"></div>
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="document.getElementById('day-overlay').classList.remove('open')">Cancelar</button>
      <button class="btn-save" onclick="saveDay()">Añadir día</button>
    </div>
  </div>
</div>

<!-- DETALLE EVENTO -->
<div class="detail" id="detail-view">
  <div class="detail-hdr">
    <button class="back-btn" onclick="closeDetail()"><i class="ti ti-arrow-left"></i></button>
    <div class="dv-icon" id="dv-icon-wrap"><i id="dv-icon" class="ti"></i></div>
    <div class="dv-hdr-info"><h2 id="dv-name"></h2><p id="dv-day"></p></div>
  </div>
  <div class="detail-body">
    <div class="dv-row"><i class="ti ti-clock"></i><div class="dv-row-info"><label>Horario</label><p id="dv-time"></p></div></div>
    <div class="dv-row" id="dv-price-row"><i class="ti ti-coin-euro"></i><div class="dv-row-info"><label>Precio</label><p id="dv-price"></p></div></div>
    <div class="dv-row" id="dv-pay-row"><i class="ti ti-wallet"></i><div class="dv-row-info"><label>Forma de pago</label><p id="dv-pay"></p></div></div>
    <div class="dv-row" id="dv-detail-row"><i class="ti ti-info-circle"></i><div class="dv-row-info"><label>Detalle 1</label><p id="dv-detail-txt"></p></div></div>
    <div class="dv-row" id="dv-detail2-row"><i class="ti ti-info-circle"></i><div class="dv-row-info"><label>Detalle 2</label><p id="dv-detail2-txt"></p></div></div>
    <div class="notes-wrap">
      <label><i class="ti ti-notes"></i> Notas</label>
      <textarea id="dv-notes" placeholder="Escribe notas, direcciones, recordatorios…" oninput="saveNotes()"></textarea>
    </div>
  </div>
  <button class="edit-btn" onclick="editCurrent()"><i class="ti ti-edit"></i> Editar evento</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDwE8hKAHDn3iHpAe6TDzBSwuzYvMl-6ps",
  authDomain: "viaje-jp.firebaseapp.com",
  databaseURL: "https://viaje-jp-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "viaje-jp",
  storageBucket: "viaje-jp.firebasestorage.app",
  messagingSenderId: "423527179030",
  appId: "1:423527179030:web:77a541a9c3987e60bba637"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dbRef = ref(db, 'viaje');

const DEFAULT_DAYS = [
  {id:1,date:'Lun 3 Ago',events:[]},
  {id:2,date:'Mar 4 Ago',events:[]},
  {id:3,date:'Mié 5 Ago',events:[]},
  {id:4,date:'Jue 6 Ago',events:[]},
  {id:5,date:'Vie 7 Ago',events:[]},
  {id:6,date:'Sáb 8 Ago',events:[]},
  {id:7,date:'Dom 9 Ago',events:[]},
  {id:8,date:'Lun 10 Ago',events:[]},
  {id:9,date:'Mar 11 Ago',events:[]},
  {id:10,date:'Mié 12 Ago',events:[]},
  {id:11,date:'Jue 13 Ago',events:[]},
  {id:12,date:'Vie 14 Ago',events:[]},
  {id:13,date:'Sáb 15 Ago',events:[]},
  {id:14,date:'Dom 16 Ago',events:[]},
  {id:15,date:'Lun 17 Ago',events:[]},
  {id:16,date:'Mar 18 Ago',events:[]},
  {id:17,date:'Mié 19 Ago',events:[]},
  {id:18,date:'Jue 20 Ago',events:[]},
  {id:19,date:'Vie 21 Ago',events:[]},
  {id:20,date:'Sáb 22 Ago',events:[]},
  {id:21,date:'Dom 23 Ago',events:[]}
];

const COLORS=['#378ADD','#1D9E75','#D4537E','#D85A30','#7F77DD','#BA7517','#E24B4A','#5a5a5a','#639922','#0F6E56','#5DCAA5','#F0997B'];
const ICONS=['ti-plane','ti-plane-arrival','ti-plane-departure','ti-car','ti-train','ti-bus','ti-subway','ti-ship','ti-bike','ti-walk','ti-run','ti-building','ti-building-castle','ti-hotel','ti-bed','ti-bed-flat','ti-alarm','ti-clock-hour-4','ti-beach','ti-mountain','ti-tree','ti-camera','ti-fork','ti-fork-knife','ti-bowl-spoon','ti-salad','ti-burger','ti-coffee','ti-coffee-off','ti-pizza','ti-glass-full','ti-bottle','ti-ticket','ti-swimming','ti-kayak','ti-tent','ti-map-pin','ti-star','ti-heart','ti-shopping-bag','ti-shopping-cart','ti-music','ti-photo','ti-flag','ti-compass','ti-car-garage','ti-first-aid-kit','ti-luggage','ti-passport'];
const PAY_EMOJI={Suica:'🚇',Efectivo:'💴',Tarjeta:'💳'};
const CUR_SYM={EUR:'€',JPY:'¥'};

let days = DEFAULT_DAYS;
let selColor=COLORS[0],selIcon=ICONS[0],editingId=null,editingDayId=null,currentDetailId=null,activeDayId=null;
let loaded = false;
let isOnline = navigator.onLine;
let pendingSync = false;

const LOCAL_KEY = 'viaje_cache';

function setIndicator(text, color, autohide=true) {
  const ind = document.getElementById('sync-indicator');
  if (!ind) return;
  ind.textContent = text;
  ind.style.color = color;
  if (autohide) setTimeout(() => ind.textContent = '', 2000);
}

function saveLocal() {
  localStorage.setItem(LOCAL_KEY, JSON.stringify(days));
}

function loadLocal() {
  const raw = localStorage.getItem(LOCAL_KEY);
  if (!raw) return false;
  try { days = JSON.parse(raw); return true; } catch { return false; }
}

function normalizeDays(data) {
  const raw = Array.isArray(data) ? data : Object.values(data);
  return raw.filter(Boolean).map(d => ({
    ...d,
    events: d.events
      ? (Array.isArray(d.events) ? d.events : Object.values(d.events)).filter(Boolean)
      : []
  }));
}

// Arrancar offline si no hay conexión
if (!isOnline) {
  const ok = loadLocal();
  days = ok ? days : DEFAULT_DAYS;
  loaded = true;
  activeDayId = days[0]?.id || 1;
  document.addEventListener('DOMContentLoaded', () => {
    render();
    setIndicator('📵 Sin conexión', '#D85A30', false);
  });
}

// Escuchar cambios en Firebase en tiempo real
onValue(dbRef, (snapshot) => {
  if (!isOnline) return;
  const data = snapshot.val();
  if (data) {
    days = normalizeDays(data);
    saveLocal();
  }
  if (!loaded) {
    loaded = true;
    activeDayId = days[0]?.id || 1;
    render();
    setIndicator('☁️ Conectado', '#1D9E75');
  } else {
    render();
  }
});

function save() {
  saveLocal(); // siempre guarda local
  if (isOnline) {
    set(dbRef, days);
    setIndicator('☁️ Guardado', '#1D9E75');
  } else {
    pendingSync = true;
    setIndicator('💾 Guardado local', '#D85A30', false);
  }
}

// Detectar cambios de conexión
window.addEventListener('online', () => {
  isOnline = true;
  setIndicator('☁️ Conectado', '#1D9E75');
  if (pendingSync) {
    set(dbRef, days);
    pendingSync = false;
    setIndicator('☁️ Sincronizado', '#1D9E75');
  }
});
window.addEventListener('offline', () => {
  isOnline = false;
  setIndicator('📵 Sin conexión', '#D85A30', false);
});

function fmtPrice(price,currency){
  const p=parseFloat(price)||0;
  if(!p)return null;
  if(currency==='JPY')return'¥'+Math.round(p).toLocaleString('es-ES');
  return p.toFixed(2).replace('.',',')+' €';
}

function darken(hex){
  // returns a dark version of the color for text on solid bg
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const lum=0.299*r+0.587*g+0.114*b;
  return lum>140?'rgba(0,0,0,0.75)':'rgba(255,255,255,0.95)';
}

function lighten(hex,pct){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const mix=c=>Math.round(c+(255-c)*pct);
  return`rgb(${mix(r)},${mix(g)},${mix(b)})`;
}

function getDayEvents(){return days.find(d=>d.id===activeDayId)||{events:[]}}

function daySummary(d){
  const evs=d.events;
  const pays=['Suica','Efectivo','Tarjeta'];
  const totals={};
  let grandEUR=0,grandJPY=0;
  evs.forEach(ev=>{
    const p=parseFloat(ev.price)||0;if(!p)return;
    const k=ev.pay||'Sin especificar';
    if(!totals[k])totals[k]={EUR:0,JPY:0};
    if(ev.currency==='JPY')totals[k].JPY+=p; else totals[k].EUR+=p;
    if(ev.currency==='JPY')grandJPY+=p; else grandEUR+=p;
  });
  return{totals,grandEUR,grandJPY};
}

function renderTabs(){
  const wrap=document.getElementById('day-tabs');
  wrap.innerHTML='';
  days.forEach(d=>{
    const t=document.createElement('div');
    t.className='day-tab'+(d.id===activeDayId?' active':'');
    t.textContent=`Día ${d.id} · ${d.date}`;
    t.onclick=()=>{activeDayId=d.id;renderTabs();renderDay()};
    wrap.appendChild(t);
  });
  const add=document.createElement('div');
  add.className='add-day-tab';add.innerHTML='<i class="ti ti-plus"></i>';
  add.onclick=()=>document.getElementById('day-overlay').classList.add('open');
  wrap.appendChild(add);
}

function renderNotes(text,txtCol){
  const lines=text.split('\n');
  const items=lines.map(line=>{
    const m=line.match(/^- (.*)$/);
    if(m){
      return`<li><input type="checkbox" onclick="event.stopPropagation()"><span>${m[1]}</span></li>`;
    }
    return line?`<li><span>${line}</span></li>`:'<li><span>&nbsp;</span></li>';
  });
  return`<ul>${items.join('')}</ul>`;
}

function renderDay(){
  const d=days.find(x=>x.id===activeDayId);
  if(!d)return;

  // summary
  const{totals,grandEUR,grandJPY}=daySummary(d);
  const sw=document.getElementById('day-summary-wrap');
  const rows=Object.entries(totals).map(([k,v])=>{
    const parts=[];
    if(v.EUR)parts.push(v.EUR.toFixed(2).replace('.',',')+' €');
    if(v.JPY)parts.push('¥'+Math.round(v.JPY).toLocaleString('es-ES'));
    const emoji=PAY_EMOJI[k]||'💰';
    return`<div class="summary-row"><span>${emoji} ${k}</span><strong>${parts.join(' + ')}</strong></div>`;
  }).join('');
  const totParts=[];
  if(grandEUR)totParts.push(grandEUR.toFixed(2).replace('.',',')+' €');
  if(grandJPY)totParts.push('¥'+Math.round(grandJPY).toLocaleString('es-ES'));
  sw.innerHTML=`<div class="day-summary">${rows}
    <div class="summary-total"><span>Total día ${d.id}</span><strong>${totParts.join(' + ')||'0 €'}</strong></div>
  </div>`;

  // events
  const c=document.getElementById('items-container');
  const sorted=[...d.events].sort((a,b)=>a.start.localeCompare(b.start));
  c.innerHTML=sorted.map(ev=>{
    const txtCol=darken(ev.color);
    const iconBg=lighten(ev.color,.3);
    const prStr=fmtPrice(ev.price,ev.currency);
    const notesHtml=ev.notes?renderNotes(ev.notes,txtCol):'';
    const rightPad=(prStr||ev.pay)?'padding-right:72px':'';
    return`<div class="ev" style="background:${ev.color};border-color:${ev.color}" onclick="openDetail('${ev.id}')">
      <div class="ev-top">
        <div class="ev-icon" style="background:${iconBg};color:${txtCol}"><i class="ti ${ev.icon}"></i></div>
        <div class="ev-body" style="${rightPad}">
          <div class="ev-name" style="color:${txtCol}">${ev.name}</div>
          <div class="ev-meta" style="color:${txtCol}">
            <span><i class="ti ti-clock" style="font-size:11px"></i> ${ev.start}–${ev.end}</span>
            ${ev.detail?`<span>${ev.detail}</span>`:''}
          </div>
          ${ev.detail2?`<div class="ev-meta2" style="color:${txtCol}">${ev.detail2}</div>`:''}
          ${notesHtml?`<div class="ev-notes-inline" style="color:${txtCol};border-top:1px solid ${txtCol==='rgba(255,255,255,0.95)'?'rgba(255,255,255,0.2)':'rgba(0,0,0,0.12)'};margin-top:9px;padding-top:9px">${notesHtml}</div>`:''}
        </div>
      </div>
      <div class="ev-right">
        ${prStr?`<span class="ev-price" style="color:${txtCol}">${prStr}</span>`:''}
        ${ev.pay?`<span class="ev-pay" style="color:${txtCol}">${PAY_EMOJI[ev.pay]||''} ${ev.pay}</span>`:''}
      </div>
    </div>`;
  }).join('');

  document.getElementById('main-scroll').scrollTop=0;
}

function render(){renderTabs();renderDay()}

// COLOR & ICON pickers
function buildColorRow(){
  const r=document.getElementById('color-row');r.innerHTML='';
  COLORS.forEach(c=>{
    const s=document.createElement('div');s.className='cswatch'+(c===selColor?' sel':'');
    s.style.background=c;s.onclick=()=>{selColor=c;buildColorRow()};r.appendChild(s);
  });
  const ci=document.createElement('input');ci.type='color';ci.value=selColor;
  ci.oninput=e=>{selColor=e.target.value;buildColorRow()};r.appendChild(ci);
}
function buildIconGrid(){
  const g=document.getElementById('icon-grid');g.innerHTML='';
  ICONS.forEach(ic=>{
    const d=document.createElement('div');d.className='icon-opt'+(ic===selIcon?' sel':'');
    d.innerHTML=`<i class="ti ${ic}"></i>`;d.onclick=()=>{selIcon=ic;buildIconGrid()};g.appendChild(d);
  });
}
function buildDaySelect(sel){
  document.getElementById('f-day').innerHTML=days.map(d=>`<option value="${d.id}"${d.id===sel?' selected':''}>Día ${d.id} · ${d.date}</option>`).join('');
}

// MODAL EVENTO
function openNew(dayId){
  editingId=null;editingDayId=dayId||activeDayId||days[0]?.id||1;
  document.getElementById('modal-title').textContent='Nuevo evento';
  document.getElementById('btn-del').style.display='none';
  document.getElementById('f-name').value='';
  document.getElementById('f-detail').value='';
  document.getElementById('f-detail2').value='';
  document.getElementById('f-start').value='09:00';
  document.getElementById('f-end').value='10:00';
  document.getElementById('f-price').value='';
  document.getElementById('f-currency').value='EUR';
  document.getElementById('f-pay').value='';
  selColor=COLORS[0];selIcon=ICONS[0];
  buildDaySelect(editingDayId);buildColorRow();buildIconGrid();
  document.getElementById('modal-overlay').classList.add('open');
}
function openEdit(evId){
  const ev=days.flatMap(d=>d.events).find(e=>e.id===evId);if(!ev)return;
  editingId=evId;editingDayId=days.find(d=>d.events.some(e=>e.id===evId)).id;
  document.getElementById('modal-title').textContent='Editar evento';
  document.getElementById('btn-del').style.display='block';
  document.getElementById('f-name').value=ev.name;
  document.getElementById('f-detail').value=ev.detail||'';
  document.getElementById('f-detail2').value=ev.detail2||'';
  document.getElementById('f-start').value=ev.start;
  document.getElementById('f-end').value=ev.end;
  document.getElementById('f-price').value=ev.price||'';
  document.getElementById('f-currency').value=ev.currency||'EUR';
  document.getElementById('f-pay').value=ev.pay||'';
  selColor=ev.color;selIcon=ev.icon;
  buildDaySelect(editingDayId);buildColorRow();buildIconGrid();
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open')}
function saveEvent(){
  const name=document.getElementById('f-name').value.trim();if(!name)return;
  const dayId=parseInt(document.getElementById('f-day').value);
  const oldNotes=editingId?(days.flatMap(d=>d.events).find(e=>e.id===editingId)||{}).notes||'':'';
  const ev={id:editingId||'e'+Date.now(),name,
    detail:document.getElementById('f-detail').value,
    detail2:document.getElementById('f-detail2').value,
    start:document.getElementById('f-start').value,
    end:document.getElementById('f-end').value,
    price:parseFloat(document.getElementById('f-price').value)||0,
    currency:document.getElementById('f-currency').value,
    pay:document.getElementById('f-pay').value,
    color:selColor,icon:selIcon,notes:oldNotes};
  if(editingId)days.forEach(d=>{const i=d.events.findIndex(e=>e.id===editingId);if(i>-1)d.events.splice(i,1)});
  const d=days.find(d=>d.id===dayId);if(d)d.events.push(ev);
  save();closeModal();render();
}
function deleteEvent(){
  if(!editingId)return;
  days.forEach(d=>{const i=d.events.findIndex(e=>e.id===editingId);if(i>-1)d.events.splice(i,1)});
  save();closeModal();closeDetail();render();
}

// NUEVO DÍA
function saveDay(){
  const raw=document.getElementById('nd-date').value;
  let label='';
  if(raw){
    const dt=new Date(raw+'T12:00:00');
    const days_es=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    const months_es=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    label=`${days_es[dt.getDay()]} ${dt.getDate()} ${months_es[dt.getMonth()]}`;
  }
  const newId=days.length?Math.max(...days.map(d=>d.id))+1:1;
  days.push({id:newId,date:label||`Día ${newId}`,events:[]});
  document.getElementById('nd-date').value='';
  document.getElementById('day-overlay').classList.remove('open');
  activeDayId=newId;save();render();
}

// DETALLE
function openDetail(evId){
  const ev=days.flatMap(d=>d.events).find(e=>e.id===evId);if(!ev)return;
  const day=days.find(d=>d.events.some(e=>e.id===evId));
  currentDetailId=evId;
  const iw=document.getElementById('dv-icon-wrap');
  iw.style.background=lighten(ev.color,.35);iw.style.color=darken(ev.color);
  document.getElementById('dv-icon').className='ti '+ev.icon;
  document.getElementById('dv-name').textContent=ev.name;
  document.getElementById('dv-day').textContent=`Día ${day.id} · ${day.date}`;
  document.getElementById('dv-time').textContent=`${ev.start} → ${ev.end}`;
  const prStr=fmtPrice(ev.price,ev.currency);
  document.getElementById('dv-price').textContent=prStr||'Sin coste';
  document.getElementById('dv-pay').textContent=ev.pay?(PAY_EMOJI[ev.pay]||'')+' '+ev.pay:'—';
  document.getElementById('dv-pay-row').style.display='flex';
  document.getElementById('dv-detail-txt').textContent=ev.detail||'Sin detalle';
  document.getElementById('dv-detail-row').style.display=ev.detail?'flex':'none';
  document.getElementById('dv-detail2-txt').textContent=ev.detail2||'';
  document.getElementById('dv-detail2-row').style.display=ev.detail2?'flex':'none';
  document.getElementById('dv-notes').value=ev.notes||'';
  document.getElementById('detail-view').classList.add('open');
}
function closeDetail(){document.getElementById('detail-view').classList.remove('open');currentDetailId=null}
function saveNotes(){
  if(!currentDetailId)return;
  const ev=days.flatMap(d=>d.events).find(e=>e.id===currentDetailId);
  if(ev){ev.notes=document.getElementById('dv-notes').value;save();}
}
function editCurrent(){const id=currentDetailId;closeDetail();if(id)openEdit(id)}

document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))closeModal()});
document.getElementById('day-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('day-overlay'))document.getElementById('day-overlay').classList.remove('open')});

// Exponer funciones al scope global (necesario con type="module")
window.openNew=openNew;
window.openEdit=openEdit;
window.closeModal=closeModal;
window.saveEvent=saveEvent;
window.deleteEvent=deleteEvent;
window.saveDay=saveDay;
window.openDetail=openDetail;
window.closeDetail=closeDetail;
window.saveNotes=saveNotes;
window.editCurrent=editCurrent;

// activeDayId y render() los lanza onValue cuando carga Firebase
// Registrar Service Worker para funcionamiento offline
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/mi-viaje/sw.js').catch(() => {});
}
</script>
</body>
